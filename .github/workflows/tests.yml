name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Capture Java 17 path
        run: echo "JDK17=$JAVA_HOME" >> "$GITHUB_ENV"

      - name: Set up Java 8 toolchain
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 8

      - name: Capture Java 8 path
        run: echo "JDK8=$JAVA_HOME" >> "$GITHUB_ENV"

      - name: Run tests
        env:
          JAVA_HOME: ${{ env.JDK17 }}
        run: ./gradlew test -Dorg.gradle.java.installations.paths="$JDK8"
